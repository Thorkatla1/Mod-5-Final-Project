<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies</title>

    <script src="index.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <script
      src="https://kit.fontawesome.com/bcd0085322.js"
      crossorigin="anonymous"
      defer
    ></script>
  </head>
  <body>
    <section id="nav">
      <nav>
        <div class="nav__container">
          <div class="logo__img--wrapper">
            <img class="logo" src="sky.logo.png" alt="" />
          </div>
          <div class="input__wrapper">
            <input type="text" placeholder="search movie title" />
            <a href="page2.html"
              ><button class="search__button">
                <i class="fa fa-search"></i></button
            ></a>
          </div>
          <div class="nav__link__wrapper">
            <ul class="nav__links">
              <li><a href="#" class="nav__link">Login or Sign-up</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </section>
    <section id="header">
      <div class="header__container">
        <div class="header__row">
          <div class="main__header--wrapper">
            <figure class="header__img--wrapper">
              <img class="header__img" src="night__sky2.png" />
            </figure>
            <div class="main__header">
              <h1>
                <span class="blue__text">SKY</span>
              </h1>
              <h2>look-up and see the stars!</h2>
              <h3 class="landing__text">
                What would you like to watch tonight?
              </h3>
            </div>
          </div>
          <figure class="header__background--wrapper">
            <img
              class="header__background"
              src="assets/film real black.png"
              alt=""
            />
          </figure>
        </div>
      </div>
    </section>
    <section id="footer">
      <div class="container">
        <ul class="footer__links">
          <li><a href="#" class="nav__link">Buy Gift Cards</a></li>
          <li><a href="#" class="nav__link">Merch</a></li>
          <li>
            <a href="#" class="nav__link"
              ><i class="fa-regular fa-copyright"></i>Copyright Sky Inc. 2026</a
            >
          </li>
        </ul>
      </div>
    </section>
  </body>
</html>
