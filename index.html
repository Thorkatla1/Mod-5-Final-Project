<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies</title>

  <script src="https://example.com/fontawesome/v7.0.1/js/conflict-detection.js"></script>

  <script src="index.js"></script>
  
  <link rel="stylesheet" href="styles.css" />

</head>
<body>
  <section id="nav">
    <nav>
      <div class="nav__container">
        <div class="logo__img--wrapper">
          <img class="logo" src="sky.logo.png" alt="" />
        </div>
        <div class="input__wrapper">
          <input type="text" placeholder="search movie title" />
          <button class="search__button" onclick="shrinkImg(event)">
            <i class="fa fa-search" id="sear"></i>
          </button>
        </div>
        <div class="nav__link__wrapper">
          <ul class="nav__links">
            <li><a href="#" class="nav__link">Login or Sign-up</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </section>
  <section id="header">
    <div class="header__container">
      <figure>
        <img class="header__img" src="night__sky2.png" />
      </figure>
      <div class="header__description">
        <h1 class="main__header">
          <span class="blue">SKY</span> <br />
          Look-up and see the stars!
        </h1>
        <h2 class="landing__text">What would you like to watch tonight?</h2>
        <a href="#features"> </a>
      </div>
      <figure class="header__background--wrapper">
        <img
          class="header__background"
          src="assets/film real black.png"
          alt=""
        />
      </figure>
    </div>
  </section>
  <section id="footer">
    <div class="container">
      <ul class="footer__links">
        <li><a href="#" class="nav__link">Buy Gift Cards</a></li>
        <li><a href="#" class="nav__link">Merch</a></li>
        <li><a href="#" class="nav__link">Copyright2026 Sky Inc.</a></li>
      </ul>
    </div>
  </section>
</body>
