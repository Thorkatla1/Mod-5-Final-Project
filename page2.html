<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies</title>
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <section id="nav">
      <nav>
        <div class="nav__container">
          <div class="logo__img--wrapper">
            <img class="logo" src="sky.logo.png" alt="Sky Logo" />
          </div>
          <div class="input__wrapper">
            <input type="text" placeholder="Search movie title" onchange ="inputData(event)" />
            <a href="page2.html"></a>
            <button class="search__button" aria-label="Search">
              <i class="fa fa-search" id="sky__img"></i>
            </button>
          </div>
          <div class="nav__link__wrapper">
            <div class="movies__header">
              <select id="filter"  onchange="filterMovies(event)">
                <option value="" disabled selected onchange="">Sort</option>
                <option value="A_TO_Z">
                  A to Z
                </option>
                <option value="Z_TO_A" >
                  Z to A
                </option>
                <option value="NEWEST_TO_OLDEST" >
                  Newest to Oldest
                </option>
                <option value="OLDEST_TO_NEWEST">
                  Oldest to Newest
                </option>
              </select>
            </div>
          </div>
        </div>
      </nav>
    </section>
    <section id="header">
      <div class="p2header__container">
        <div class="p2header__row">
          <figure class="header__background--wrapper">
            <img
              class="header__background"
              src="assets/film real black.png"
              alt="Film Reel Background"
            />
          </figure>
          <div class="movies">
            <div class="movies__row row">
              <div class="movies__container container">
                <div class="movies__list">
                  <span class="poster"> </span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section id="footer">
      <div class="container">
        <ul class="footer__links">
          <li><a href="#" class="footer__link">Buy Gift Cards</a></li>
          <li><a href="#" class="footer__link">Merch</a></li>
          <li><a href="#" class="__link">Copyright 2026 Sky Inc.</a></li>
        </ul>
      </div>
    </section>
  </body>
</html>
