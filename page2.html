<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies</title>
    <script src="index.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body>
    <section id="nav">
      <nav>
        <div class="nav__container">
          <div class="logo__img--wrapper">
            <img class="logo" src="sky.logo.png" alt="" />
          </div>
          <div class="input__wrapper">
            <input type="text" placeholder="search movie title" />
            <a href="page2.html"
              ><button class="search__button">
                <i class="fa fa-search" id="sky__img"></i></button
            ></a>
          </div>
          <div class="nav__link__wrapper">
            <div class="movies__header">
              <select id="filter" onchange="filterMovies(event)">
                <option value="" disabled selected>Sort</option>
                <option value="A TO Z">A to Z</option>
                <option value="Z TO A">Z to A</option>
                <option value="NEWEST_TO_OLDEST">Newest to Oldest</option>
                <option value="OLDEST_TO_NEWEST">Oldest to Newest</option>
              </select>
            </div>
          </div>
        </div>
      </nav>
    </section>
    <section id="header">
      <div class="p2header__container">
        <div class="p2header__row">
          <figure class="header__background--wrapper">
            <img
              class="header__background"
              src="assets/film real black.png"
              alt=""
            />
          </figure>
          <div class="movies"></div>
        </div>
      </div>
    </section>
    <section id="footer">
      <div class="container">
        <ul class="footer__links">
          <li><a href="#" class="nav__link">Buy Gift Cards</a></li>
          <li><a href="#" class="nav__link">Merch</a></li>
          <li><a href="#" class="nav__link">Copyright 2026 Sky Inc.</a></li>
        </ul>
      </div>
    </section>
  </body>
</html>
